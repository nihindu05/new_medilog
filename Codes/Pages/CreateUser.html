<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create User | MedLogs</title>
  <link rel="stylesheet" href="../css/AdminDashboard.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="dashboard-container">
  <aside class="sidebar">
    <div>
      <div class="brand">
        <div class="brand-icon"><i data-lucide="shield-plus"></i></div>
        <div><h2>Forensic Medical</h2><p>Management System</p></div>
      </div>
      <nav>
        <a class="nav-item" href="AdminDashboard.html"><i data-lucide="layout-dashboard"></i>Dashboard</a>
        <a class="nav-item" href="UserManagement.html"><i data-lucide="users"></i>User Management</a>
        <a class="nav-item active" href="CreateUser.html"><i data-lucide="user-plus"></i>Create User</a>
        <a class="nav-item" href="CaseManagement.html"><i data-lucide="folder-open"></i>Cases</a>
        <a class="nav-item" href="DocumentsAndReports.html"><i data-lucide="file-text"></i>Reports</a>
        <a class="nav-item" href="EvidenceSamples.html"><i data-lucide="database"></i>Evidence</a>
        <a class="nav-item" href="Settings.html"><i data-lucide="settings"></i>Settings</a>
      </nav>
    </div>
    <div class="logout" onclick="window.MedLogsAPI.clearSession(); location.href='auth.html';">
      <i data-lucide="log-out"></i>Logout
    </div>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <div><h1>Create User</h1><p>Create a new system user account</p></div>
      <div class="profile">
        <div class="profile-icon"><i data-lucide="user"></i></div>
        <div><h3>System Administrator</h3><span>ADMIN</span></div>
      </div>
    </header>

    <form class="panel" id="createUserForm">
      <div class="panel-header"><h2>Create New User</h2></div>
      <div class="form-grid">
        <div class="input-group">
          <label for="roleSelect">Role</label>
          <select id="roleSelect" required>
            <option value="">Select Role</option>
            <option value="JMO">JMO</option>
            <option value="ASSISTANT_JMO">Assistant JMO</option>
            <option value="DOCTOR">Doctor</option>
            <option value="LAB">Lab Staff</option>
            <option value="CLERK">Clerk</option>
            <option value="POLICE">Police Officer</option>
          </select>
        </div>
        <div class="input-group"><label>Generated User ID</label><input id="generatedId" readonly></div>
        <div class="input-group"><label>Full Name</label><input id="fullName" type="text" required></div>
        <div class="input-group"><label>Email</label><input id="email" type="email" required></div>
        <div class="input-group">
          <label>Status</label>
          <select id="status"><option>Active</option><option>Inactive</option><option>Suspended</option></select>
        </div>
        <div class="input-group" id="licenseBox"><label>License Number</label><input id="licenseNumber" type="text"></div>
        <div class="input-group"><label>Username</label><input id="username" type="text" required></div>
        <div class="input-group"><label>Password</label><input id="password" type="password" minlength="8" required></div>
      </div>
      <p id="formMessage" role="alert"></p>
      <button class="create-btn" type="submit"><i data-lucide="user-plus"></i>Create Account</button>
    </form>
  </main>
</div>
<script src="../Js/apiClient.js"></script>
<script src="../Js/CreateUser.js"></script>
</body>
</html>
