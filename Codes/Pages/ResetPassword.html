<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | MedLogs</title>
  <link rel="stylesheet" href="../css/auth.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .auth-shell { width: min(100%, 560px); }
    .auth-card { background: #fff; border: 1px solid #e1e8f2; border-radius: 20px;
      padding: 40px; box-shadow: 0 18px 55px rgba(27,62,110,.1); }
    .auth-card-header { margin-bottom: 28px; }
    .auth-card-header h1 { color: #102a57; margin-bottom: 8px; }
    .auth-card-header p { color: #69768b; }
    .form-group input { width: 100%; height: 51px; padding: 0 15px; border: 1px solid #ccd7e5;
      border-radius: 9px; font-size: 15px; }
    #resetMessage { min-height: 22px; margin: 8px 0 14px; color: #c62828; }
    .login-btn { width: 100%; height: 52px; border: 0; border-radius: 9px; color: #fff;
      background: #1769df; font-size: 16px; font-weight: 700; cursor: pointer; }
    .login-btn:disabled { opacity: .55; cursor: not-allowed; }
  </style>
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-card-header">
        <h1>Reset password</h1>
        <p>Choose a new password for your MedLogs account.</p>
      </div>

      <form id="resetForm">
        <div class="form-group">
          <label for="password">New password</label>
          <input id="password" type="password" minlength="8" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" type="password" minlength="8" required>
        </div>
        <p id="resetMessage" role="alert"></p>
        <button type="submit" class="login-btn">Update password</button>
      </form>
    </section>
  </main>
  <script src="../Js/ResetPassword.js"></script>
</body>
</html>
